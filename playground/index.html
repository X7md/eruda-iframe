<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Console Playground</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, -apple-system, sans-serif;
        background: #1e1e1e;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        background: #2d2d2d;
        color: #ccc;
        flex: none;
      }
      .toolbar button {
        background: #3c3c3c;
        color: #ccc;
        border: 1px solid #555;
        border-radius: 4px;
        padding: 4px 12px;
        cursor: pointer;
        font-size: 13px;
      }
      .toolbar button:hover {
        background: #4a4a4a;
      }
      .toolbar .url {
        flex: 1;
        background: #1e1e1e;
        border: 1px solid #444;
        border-radius: 4px;
        padding: 4px 10px;
        font-size: 12px;
        color: #8c8c8c;
        font-family: monospace;
      }
      .frame-wrap {
        flex: 1;
        min-height: 0;
        background: #fff;
      }
      .frame-wrap iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }
      #devtools-pane {
        flex: none;
        height: 25vh;
        position: relative;
        border-top: 1px solid #444;
        background: #1e1e1e;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button id="reload">⟳ Reload</button>
      <span class="url" id="url">/playground/app.html</span>
      <button id="toggle-devtools" title="Show/hide the devtools panel">
        ▦ DevTools
      </button>
    </div>
    <div class="frame-wrap">
      <iframe id="frame" src="app.html"></iframe>
    </div>
    <div id="devtools-pane"></div>
    <script>
      const frame = document.getElementById('frame')
      document.getElementById('reload').addEventListener('click', () => {
        frame.contentWindow.location.reload()
      })
      frame.addEventListener('load', () => {
        document.getElementById('url').textContent =
          frame.contentWindow.location.pathname
      })
      document
        .getElementById('toggle-devtools')
        .addEventListener('click', () => {
          const eruda = frame.contentWindow.eruda
          // eruda's native toggle; the iframe bootstrap syncs the pane
          // height to the resulting show/hide events.
          if (eruda && eruda.get()) eruda.get().toggle()
        })
    </script>
  </body>
</html>
