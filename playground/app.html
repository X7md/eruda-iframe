<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playground App</title>
    <!-- No devtools UI in here — chobitsu is the in-page Chrome DevTools
         Protocol backend (it patches console at document-start and buffers
         events until the host enables the Runtime domain). agent.js just
         pipes CDP messages over a BroadcastChannel to/from the host page,
         where eruda renders everything. -->
    <!-- data-cfasync="false": keep Cloudflare Rocket Loader from deferring
         these — the agent must run at document-start. -->
    <script data-cfasync="false" src="chobitsu.js"></script>
    <script data-cfasync="false" src="agent.js"></script>
    <script data-cfasync="false">
      console.log('Hello from the iframe! chobitsu agent is wired up.')
    </script>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: system-ui, -apple-system, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        color: #fff;
      }
      h1 {
        margin-top: 0;
        font-size: 22px;
      }
      .card {
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(6px);
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .card h2 {
        margin: 0 0 10px;
        font-size: 15px;
        opacity: 0.9;
      }
      button {
        background: rgba(255, 255, 255, 0.9);
        color: #4a3f8a;
        border: none;
        border-radius: 6px;
        padding: 8px 14px;
        margin: 3px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      button:active {
        transform: scale(0.97);
      }
      #box {
        width: 90px;
        height: 90px;
        background: #ffd166;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #4a3f8a;
        font-weight: 700;
        margin-top: 8px;
      }
      ul#list {
        margin: 8px 0 0;
        padding-left: 20px;
      }
    </style>
  </head>
  <body>
    <h1>🎮 Playground App (inside iframe)</h1>
    <p>
      Everything below is captured by the eruda panel in the host page. Try the
      console input, e.g.
      <code>document.body.style.background = 'tomato'</code>
    </p>

    <div class="card">
      <h2>Console</h2>
      <button onclick="console.log('plain log', { a: 1, b: [2, 3] })">
        log
      </button>
      <button onclick="console.warn('careful now…')">warn</button>
      <button onclick="console.error('boom (handled)')">error</button>
      <button onclick="console.table([{ x: 1, y: 2 }, { x: 3, y: 4 }])">
        table
      </button>
      <button onclick="undefinedFunction()">uncaught error</button>
      <button onclick="Promise.reject(new Error('rejected promise'))">
        promise rejection
      </button>
      <button id="interval-btn">start interval log</button>
    </div>

    <div class="card">
      <h2>Network</h2>
      <button onclick="fetch('data.json').then(r => r.json()).then(d => console.log('fetched:', d))">
        fetch data.json
      </button>
      <button onclick="fetch('../no-such-thing').then(r => console.log('status', r.status))">
        fetch 404
      </button>
      <button id="xhr-btn">XHR /data.json</button>
    </div>

    <div class="card">
      <h2>DOM (inspect &amp; edit via Elements panel)</h2>
      <div id="box" title="inspect me">#box</div>
      <ul id="list">
        <li>alpha</li>
        <li>beta</li>
        <li>gamma</li>
      </ul>
      <button id="add-item">add list item</button>
      <button id="spin-box">animate box</button>
    </div>

    <script data-cfasync="false">
      let intervalId = null
      let tick = 0
      document.getElementById('interval-btn').addEventListener('click', function () {
        if (intervalId) {
          clearInterval(intervalId)
          intervalId = null
          this.textContent = 'start interval log'
          console.info('interval stopped')
        } else {
          intervalId = setInterval(() => console.log('tick', ++tick), 1000)
          this.textContent = 'stop interval log'
        }
      })

      document.getElementById('xhr-btn').addEventListener('click', () => {
        const xhr = new XMLHttpRequest()
        xhr.open('GET', 'data.json')
        xhr.onload = () => console.log('xhr done:', xhr.status)
        xhr.send()
      })

      document.getElementById('add-item').addEventListener('click', () => {
        const li = document.createElement('li')
        li.textContent = 'item ' + (document.querySelectorAll('#list li').length + 1)
        document.getElementById('list').appendChild(li)
        console.log('added', li)
      })

      document.getElementById('spin-box').addEventListener('click', () => {
        const box = document.getElementById('box')
        box.animate(
          [{ transform: 'rotate(0turn)' }, { transform: 'rotate(1turn)' }],
          { duration: 600, easing: 'ease-in-out' }
        )
      })
    </script>
  </body>
</html>
