name: Deploy playground to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx rspack build --config build/rspack.prod.js
      - name: Assemble site
        run: |
          mkdir -p site/assets
          cp dist/eruda.js site/assets/
          cp dist/eruda.js.map site/assets/ 2>/dev/null || true
          cp -r playground site/playground
          cp test/data.json site/
          printf '<!DOCTYPE html><meta http-equiv="refresh" content="0; url=playground/">' > site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
